# Full model config (for cloud training)
model:
  d_model: 512
  num_heads: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 512
  src_vocab_size: 32000   # 中文词表
  tgt_vocab_size: 32000   # 英文词表

data:
  src_lang: zh
  tgt_lang: en
  src_vocab_size: 32000
  tgt_vocab_size: 32000
  train_path: data/processed/train
  val_path: data/processed/val
  src_vocab_path: data/vocab/bpe_zh.json
  tgt_vocab_path: data/vocab/bpe_en.json

train:
  batch_size: 32
  max_epochs: 30
  warmup_steps: 4000
  label_smoothing: 0.1
  grad_clip: 1.0
  checkpoint_dir: checkpoints
  log_interval: 100
  val_interval: 1000
  device: auto  # auto = mps/cuda/cpu
